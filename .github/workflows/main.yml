name: School Management System

on:
  schedule:
   - cron: "12 */1 * * *" 

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-timestamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: refactor python
        run: |
          TIMESTAMP_FILE="updates.txt"
          echo "Last checked: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" > "$TIMESTAMP_FILE"
          git config user.name "MathewKioko"
          git config user.email "mathewkioko@gmail.com"
          git add "$TIMESTAMP_FILE"
          if ! git diff --cached --quiet; then
            git commit -m "Update timestamp: $(date -u)"
          fi
      - name: Push changes
        run: git push origin HEAD cron  2hrs min
